<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Connect · emoji login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1499336315816-097655dcfbda?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            padding: 1rem;
        }

        /* soft overlay for readability — keeps the professional look */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            width: 100%;
            max-width: 420px;
            padding: 2.2rem 1.8rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.3) inset;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.2s ease;
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #1f2a3a;
            margin-bottom: 1.2rem;
            text-shadow: 0 2px 3px rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        h2 span {
            font-size: 2rem;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-icon {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.7);
            border-radius: 60px;
            padding: 0.1rem 1rem 0.1rem 1.5rem;
            border: 1.5px solid rgba(255,255,255,0.9);
            transition: all 0.15s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }

        .input-icon:focus-within {
            border-color: #3b6ea5;
            background: white;
            box-shadow: 0 8px 18px rgba(0,60,130,0.15);
        }

        .input-icon i {
            font-size: 1.4rem;
            margin-right: 0.6rem;
            color: #2c3e50;
        }

        .input-icon input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 1rem 0.5rem 1rem 0;
            font-size: 1.1rem;
            font-weight: 500;
            color: #1a2634;
            outline: none;
        }

        .input-icon input::placeholder {
            color: #5f6b7a;
            font-weight: 400;
            opacity: 0.7;
        }

        /* emoji row — friendly and touch optimised */
        .mood-row {
            margin: 1.8rem 0 1.5rem;
        }

        .mood-label {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            color: #1e2b3c;
            letter-spacing: 0.3px;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .emoji-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: space-between;
            background: rgba(255,255,255,0.4);
            padding: 0.8rem 1rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .emoji-btn {
            background: none;
            border: none;
            font-size: 2rem;
            padding: 0.4rem 0.2rem;
            cursor: pointer;
            border-radius: 50%;
            width: 3.5rem;
            height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            line-height: 1;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .emoji-btn:hover,
        .emoji-btn:focus {
            transform: scale(1.2);
            background: white;
            box-shadow: 0 12px 20px rgba(0,0,0,0.2);
            border-color: #f5d8b3;
            outline: none;
        }

        .emoji-btn:active {
            transform: scale(1.05);
        }

        /* selected state (optional, but we manage via session) */
        .emoji-btn.selected {
            background: #fff3e0;
            border: 2px solid #3b6ea5;
            box-shadow: 0 0 0 3px rgba(59,110,165,0.3);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1 1 130px;
            background: rgba(255,255,255,0.8);
            border: none;
            padding: 1rem 0.8rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a2b3c;
            backdrop-filter: blur(6px);
            box-shadow: 0 10px 18px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.9);
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #1f3a5f;
            color: white;
            border: 1px solid #89b9e2;
            box-shadow: 0 12px 22px rgba(0, 30, 70, 0.3);
        }

        .btn-primary:hover {
            background: #143450;
            transform: translateY(-3px);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.95);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* tiny extra spacing & mobile perfection */
        @media (max-width: 420px) {
            .login-card {
                padding: 1.8rem 1.2rem;
                border-radius: 32px;
            }
            .emoji-btn {
                width: 3rem;
                height: 3rem;
                font-size: 1.8rem;
            }
            .emoji-panel {
                padding: 0.6rem 0.6rem;
                gap: 0.3rem;
            }
            h2 {
                font-size: 1.9rem;
            }
        }

        @media (max-width: 360px) {
            .emoji-btn {
                width: 2.6rem;
                height: 2.6rem;
                font-size: 1.6rem;
            }
        }

        /* hint for selected emoji (optional feedback) */
        .selected-hint {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            margin-bottom: 0.2rem;
            color: #1e3c5a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(255,255,255,0.4);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            width: fit-content;
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>
            log in  <span>😊</span>
        </h2>

        <!-- username field with icon (font awesome style via simple text) -->
        <div class="input-group">
            <div class="input-icon">
                <i>👤</i>
                <input type="text" id="username" placeholder="Username" autocomplete="off">
            </div>
        </div>

        <!-- password field with lock emoji as icon -->
        <div class="input-group">
            <div class="input-icon">
                <i>🔐</i>
                <input type="password" id="password" placeholder="Password">
            </div>
        </div>

        <!-- 😀 😂 😍 👍 ❤️ emoji selector panel -->
        <div class="mood-row">
            <span class="mood-label">pick your mood / emoji</span>
            <div class="emoji-panel" id="emojiPanel">
                <button class="emoji-btn" data-emoji="😀">😀</button>
                <button class="emoji-btn" data-emoji="😂">😂</button>
                <button class="emoji-btn" data-emoji="😍">😍</button>
                <button class="emoji-btn" data-emoji="👍">👍</button>
                <button class="emoji-btn" data-emoji="❤️">❤️</button>
            </div>
            <!-- tiny preview of selected emoji (non‑intrusive) -->
            <div id="selectedEmojiHint" class="selected-hint">
                <span>selected:</span> <span id="emojiPreview">😀</span>
            </div>
        </div>

        <!-- action buttons -->
        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="goRegister()">
                <span>📝</span> Register
            </button>
            <button class="btn btn-primary" onclick="handleLogin()">
                <span>➡️</span> Login
            </button>
        </div>

        <!-- tiny note: design adapts perfectly to any mobile -->
        <div style="text-align: center; margin-top: 1.2rem; font-size: 0.8rem; opacity: 0.7; color: #152b3a;">
            double‑tap emoji to select
        </div>
    </div>

    <script>
        (function() {
            // --- emoji selection logic (simple client-side, stores in session but you can extend)
            let currentEmoji = '😀';  // default

            const emojiButtons = document.querySelectorAll('.emoji-btn');
            const emojiPreviewSpan = document.getElementById('emojiPreview');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password'); // kept for future, not used in original flow

            // remove selected class from all, add to active
            function updateEmojiSelection(emoji) {
                emojiButtons.forEach(btn => {
                    const btnEmoji = btn.getAttribute('data-emoji');
                    if (btnEmoji === emoji) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                });
                if (emojiPreviewSpan) {
                    emojiPreviewSpan.innerText = emoji;
                }
                // optional: you can store emoji in localStorage as well (if you like)
                try {
                    localStorage.setItem('loginEmoji', emoji);
                } catch (e) {}
            }

            // initial: set first emoji active (😀)
            updateEmojiSelection('😀');

            // add click listeners to emoji btns
            emojiButtons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const selectedEmoji = this.getAttribute('data-emoji');
                    currentEmoji = selectedEmoji;
                    updateEmojiSelection(selectedEmoji);
                });

                // also support touch friendly (same handler)
                btn.addEventListener('touchstart', function(e) {
                    e.preventDefault();  // avoid any zoom interference
                    const selectedEmoji = this.getAttribute('data-emoji');
                    currentEmoji = selectedEmoji;
                    updateEmojiSelection(selectedEmoji);
                }, { passive: false });
            });

            // expose login function to global (with same signature as original but extended)
            window.handleLogin = function() {
                let user = document.getElementById("username").value;
                if (user === "") {
                    alert("👋 Please enter username");
                    return;
                }
                // store username (original behaviour)
                localStorage.setItem("username", user);

                // also store selected emoji (optional, can be used in chat.html)
                localStorage.setItem("userEmoji", currentEmoji);

                // you could show a friendly emoji message
                alert(`Welcome ${user} ${currentEmoji} – let's go!`);

                // redirect to chat.html
                location = "chat.html";
            };

            // preserve original goRegister
            window.goRegister = function() {
                location = "register.html";
            };

            // optional: pre-fill username if stored (just to be kind)
            try {
                const savedUser = localStorage.getItem('username');
                if (savedUser) {
                    usernameInput.value = savedUser;
                }
                const savedEmoji = localStorage.getItem('loginEmoji');
                if (savedEmoji && ['😀','😂','😍','👍','❤️'].includes(savedEmoji)) {
                    currentEmoji = savedEmoji;
                    updateEmojiSelection(savedEmoji);
                }
            } catch (e) {}
        })();

        // original functions are kept for reference but replaced by handleLogin & goRegister
        // but we also keep login() to avoid breaking if called from onclick (but we changed button to handleLogin)
        // however button directly calls handleLogin now. We'll leave dummy for safety.
        window.login = function() {
            // fallback if someone calls login() from console – but we use handleLogin
            let user = document.getElementById("username").value;
            if (user === "") { alert("Please enter username"); return; }
            localStorage.setItem("username", user);
            location = "chat.html";
        };

        window.goRegister = function() {
            location = "register.html";
        };
    </script>
    <!-- small note: background image is from unsplash (modern abstract with soft light) 
         it gives a professional but warm atmosphere. Fully mobile friendly. -->
</body>
</html>
