<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Connect · chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1499336315816-097655dcfbda?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            padding: 1rem;
        }

        /* same soft overlay as login page */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 0;
        }

        /* main chat card — matches login card aesthetic */
        .chat-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            width: 100%;
            max-width: 1200px;
            padding: 1.8rem 1.8rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.3) inset;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* container for two columns */
        .chat-dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        /* left panel: online users */
        .users-panel {
            flex: 1 1 260px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 1.5rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
            max-height: 70vh;
            overflow-y: auto;
        }

        .users-panel h3 {
            font-size: 1.7rem;
            font-weight: 600;
            color: #1f2a3a;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 2px dashed rgba(59, 110, 165, 0.3);
            padding-bottom: 0.8rem;
        }

        .users-panel h3 span {
            font-size: 1.8rem;
        }

        #userList {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        #userList li {
            background: rgba(255, 255, 255, 0.6);
            padding: 0.8rem 1.2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #1a2b3c;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: 0.1s ease;
            word-break: break-word;
        }

        #userList li::before {
            content: "🟢";
            font-size: 1rem;
            filter: drop-shadow(0 2px 2px rgba(0,128,0,0.3));
        }

        /* right panel: chat area */
        .chat-panel {
            flex: 3 1 400px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 1.5rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            max-height: 70vh;
        }

        /* messages container */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-height: 200px;
            scroll-behavior: smooth;
        }

        /* message bubbles */
        .message {
            max-width: 85%;
            padding: 0.8rem 1.2rem;
            border-radius: 28px;
            font-size: 1rem;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.7);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0.6; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own {
            align-self: flex-end;
            background: #1f3a5fcc;
            color: white;
            border-bottom-right-radius: 8px;
            border: 1px solid #5f8ab6;
        }

        .message.other {
            align-self: flex-start;
            background: rgba(255,255,255,0.8);
            color: #1a2b3c;
            border-bottom-left-radius: 8px;
        }

        .message .sender {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
            color: inherit;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* typing indicator */
        #typing {
            font-size: 0.95rem;
            color: #1e3c5a;
            padding: 0.4rem 0.8rem;
            background: rgba(255,255,255,0.5);
            border-radius: 50px;
            margin: 0.5rem 0 0.2rem;
            backdrop-filter: blur(4px);
            display: inline-block;
            width: fit-content;
            border: 1px solid rgba(255,255,255,0.7);
            font-style: italic;
        }

        /* input row */
        .input-row {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
        }

        .chat-input {
            flex: 1 1 200px;
            background: rgba(255,255,255,0.7);
            border-radius: 60px;
            padding: 0.1rem 1.2rem;
            border: 1.5px solid rgba(255,255,255,0.9);
            transition: 0.15s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
        }

        .chat-input:focus-within {
            border-color: #3b6ea5;
            background: white;
            box-shadow: 0 8px 18px rgba(0,60,130,0.15);
        }

        .chat-input input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 1rem 0.5rem 1rem 0.5rem;
            font-size: 1.1rem;
            color: #1a2634;
            outline: none;
        }

        .chat-input input::placeholder {
            color: #5f6b7a;
            font-weight: 400;
            opacity: 0.7;
        }

        .send-btn {
            background: #1f3a5f;
            border: none;
            padding: 0 2rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            backdrop-filter: blur(6px);
            box-shadow: 0 10px 18px rgba(0,0,0,0.15);
            border: 1px solid #89b9e2;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            min-width: 100px;
            height: 3.5rem;
        }

        .send-btn:hover {
            background: #143450;
            transform: translateY(-2px);
        }

        .send-btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* mobile optimization */
        @media (max-width: 700px) {
            .chat-dashboard {
                flex-direction: column;
            }
            .users-panel {
                max-height: 30vh;
            }
            .chat-panel {
                max-height: 60vh;
            }
            .chat-card {
                padding: 1.2rem;
            }
            .send-btn {
                padding: 0 1.2rem;
                min-width: auto;
            }
        }

        @media (max-width: 450px) {
            .input-row {
                flex-direction: column;
            }
            .send-btn {
                width: 100%;
            }
            .users-panel h3 {
                font-size: 1.4rem;
            }
        }

        /* custom scrollbar (fits aesthetic) */
        #messages::-webkit-scrollbar, .users-panel::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        #messages::-webkit-scrollbar-thumb {
            background: #3b6ea5;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-card">
        <!-- header with subtle emoji (like login page) -->
        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.2rem; padding-left: 0.5rem;">
            <span style="font-size: 2rem;">💬</span>
            <h2 style="color: #1f2a3a; font-weight: 600; letter-spacing: -0.3px;">community chat</h2>
        </div>

        <div class="chat-dashboard">
            <!-- LEFT: online users (exactly as requested) -->
            <div class="users-panel">
                <h3>
                    <span>👥</span> Online Users
                </h3>
                <ul id="userList">
                    <!-- dynamic entries will be injected by chat.js -->
                    <li>alex</li>
                    <li>sam</li>
                    <li>jordan</li>
                    <!-- these are just static placeholders until socket loads -->
                </ul>
                <div style="margin-top: 1rem; font-size: 0.9rem; opacity: 0.7; text-align: center; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 0.8rem;">
                    <span>🌟 </span><span id="userCount">3</span> active
                </div>
            </div>

            <!-- RIGHT: chat -->
            <div class="chat-panel">
                <!-- messages area -->
                <div id="messages">
                    <!-- demo messages to preview look (will be replaced by socket) -->
                    <div class="message other">
                        <div class="sender"><span>👤</span> jordan</div>
                        <div>hey everyone! 😀</div>
                    </div>
                    <div class="message own">
                        <div class="sender"><span>⭐</span> you</div>
                        <div>hi! love this design ❤️</div>
                    </div>
                    <div class="message other">
                        <div class="sender"><span>👤</span> alex</div>
                        <div>looks professional 👍</div>
                    </div>
                </div>

                <!-- typing indicator (exactly as requested) -->
                <div id="typing"></div>

                <!-- input row with send button -->
                <div class="input-row">
                    <div class="chat-input">
                        <input type="text" id="msg" placeholder="Type message 😂😍">
                    </div>
                    <button class="send-btn" onclick="send()">
                        <span>📤</span> Send
                    </button>
                </div>
                <div style="margin-top: 0.5rem; font-size: 0.75rem; opacity: 0.6; padding-left: 0.5rem;">
                    emojis welcome • mobile friendly
                </div>
            </div>
        </div>
    </div>

    <!-- include socket.io and chat.js (kept exactly as original) -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="chat.js"></script>

    <!-- small simulation to demonstrate dynamic behaviour if chat.js is not yet ready (just for preview) 
         but we keep it fully compatible: we define window.send stub if chat.js hasn't overridden it -->
    <script>
        (function() {
            // preserve original expected globals. If chat.js defines its own send, it will override.
            window.send = window.send || function() {
                const msgInput = document.getElementById('msg');
                if (!msgInput) return;
                const text = msgInput.value.trim();
                if (text === '') return;
                // dummy local echo for preview when socket not connected
                const messagesDiv = document.getElementById('messages');
                if (messagesDiv) {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message own';
                    // try to get username from localStorage (set by login page)
                    let user = 'You';
                    try {
                        const stored = localStorage.getItem('username');
                        if (stored) user = stored;
                    } catch(e) {}
                    msgDiv.innerHTML = `<div class="sender"><span>⭐</span> ${user}</div><div>${text}</div>`;
                    messagesDiv.appendChild(msgDiv);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
                msgInput.value = '';
            };

            // typing simulation (for demo, you can type and see placeholder)
            const typingDiv = document.getElementById('typing');
            if (typingDiv) {
                // just to show it works: example update
                setTimeout(() => {
                    typingDiv.innerText = '✏️ alex is typing ...';
                }, 2000);
                setTimeout(() => {
                    typingDiv.innerText = '';
                }, 5000);
            }

            // update user count from static list preview
            const userList = document.getElementById('userList');
            const countSpan = document.getElementById('userCount');
            if (userList && countSpan) {
                const updateCount = () => {
                    const items = userList.querySelectorAll('li');
                    countSpan.innerText = items.length;
                };
                updateCount();
                // watch for changes (if chat.js modifies list)
                const observer = new MutationObserver(updateCount);
                observer.observe(userList, { childList: true, subtree: false });
            }
        })();
    </script>
    <!-- note: actual socket.io and chat.js will take over real-time functionality.
         This layout provides the exact structure with professional glass-morphism look. -->
</body>
</html>
